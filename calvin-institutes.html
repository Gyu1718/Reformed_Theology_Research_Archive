<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>기독교 강요 상세 색인 | Reformed Theology Research Archive</title>
  <meta name="description" content="칼빈 기독교 강요 4권 80장 구조를 주제별로 정리한 공개용 연구 색인" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-grid">
      <div>
        <p class="eyebrow">Core Reference</p>
        <h1>기독교 강요 상세 색인</h1>
        <p class="lead">칼빈 『기독교 강요』 4권 80장 구조를 주제, 위치, 연구 활용 기준으로 정리한 공개용 연구 색인입니다.</p>
      </div>
      <div class="status-card">
        <span class="status-label">Public Index</span>
        <strong>원문 비공개</strong>
        <p>업로드된 TXT는 로컬 분석에만 사용하고, 저장소에는 요약과 색인만 보관합니다.</p>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="search-panel" aria-labelledby="detail-search-title">
      <div>
        <h2 id="detail-search-title">상세 색인 검색</h2>
        <p>예: 칭의, 섭리, 교회, 성례, III.11, IV.20</p>
      </div>
      <label class="search-box">
        <span class="sr-only">검색어</span>
        <input id="detail-search" type="search" placeholder="기독교 강요 안에서 검색" autocomplete="off" />
      </label>
    </section>

    <section id="book-summary" class="results"></section>
    <section id="strategic-topics" class="results"></section>
    <section id="book-detail" class="results"></section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p><a href="index.html">← 아카이브 메인으로</a></p>
    </div>
  </footer>

  <script src="js/search.js"></script>
  <script>
    const state = { data: null, query: "" };

    document.addEventListener("DOMContentLoaded", async () => {
      const response = await fetch("data/books/calvin-institutes.json");
      state.data = await response.json();
      document.querySelector("#detail-search").addEventListener("input", (event) => {
        state.query = event.target.value.toLowerCase().trim();
        renderDetail();
      });
      renderDetail();
    });

    function matchQuery(value) {
      if (!state.query) return true;
      return JSON.stringify(value).toLowerCase().includes(state.query);
    }

    function renderDetail() {
      renderSummary();
      renderStrategicTopics();
      renderBooks();
    }

    function renderSummary() {
      const el = document.querySelector("#book-summary");
      const item = state.data;
      el.innerHTML = `
        <article class="result-card full-width">
          <div class="card-meta">${escapeHtml(item.category)} · ${escapeHtml(item.tradition)} · ${escapeHtml(item.status)}</div>
          <h2>${escapeHtml(item.title)}</h2>
          <p class="card-summary">${escapeHtml(item.originalTitle)} · ${escapeHtml(item.originalAuthor)}</p>
          <p>${escapeHtml(item.summary)}</p>
          <p class="research-use"><strong>연구 활용:</strong> ${escapeHtml(item.researchUse)}</p>
          <p class="quote-pointer"><strong>자료 원칙:</strong> ${escapeHtml(item.publicNote)}</p>
        </article>
      `;
    }

    function renderStrategicTopics() {
      const topics = state.data.strategicTopics.filter(matchQuery);
      const el = document.querySelector("#strategic-topics");
      if (!topics.length) {
        el.innerHTML = "";
        return;
      }
      el.innerHTML = `
        <article class="result-card full-width">
          <h2>전략 주제 색인</h2>
          <div class="chapter-list">
            ${topics.map((topic) => `
              <section class="chapter-item">
                <h4>${escapeHtml(topic.topic)}</h4>
                <p>${escapeHtml(topic.note)}</p>
                ${renderTags(topic.locations)}
              </section>
            `).join("")}
          </div>
        </article>
      `;
    }

    function renderBooks() {
      const el = document.querySelector("#book-detail");
      const books = state.data.books
        .map((book) => ({
          ...book,
          chapters: book.chapters.filter(matchQuery),
        }))
        .filter((book) => matchQuery(book) || book.chapters.length);

      if (!books.length) {
        el.innerHTML = `<div class="empty-state">검색 결과가 없습니다.</div>`;
        return;
      }

      el.innerHTML = books.map((book) => `
        <article class="result-card full-width">
          <div class="card-meta">${escapeHtml(book.range)}</div>
          <h2>${escapeHtml(book.title)}</h2>
          <p>${escapeHtml(book.summary)}</p>
          ${renderTags(book.majorTopics)}
          <div class="chapter-list">
            ${book.chapters.map((chapter) => `
              <section class="chapter-item">
                <div class="card-meta">${escapeHtml(chapter.ref)} · ${escapeHtml(chapter.priority)}</div>
                <h4>${escapeHtml(chapter.title)}</h4>
                <p>${escapeHtml(chapter.summary)}</p>
                ${renderTags(chapter.topics)}
              </section>
            `).join("")}
          </div>
        </article>
      `).join("");
    }
  </script>
</body>
</html>
