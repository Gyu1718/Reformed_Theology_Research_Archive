<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Reformed ⇄ Neo-Orthodox Theology Archive</title>
<meta name="description" content="개혁신학과 신정통주의(바르트) 문헌을 개념·논쟁·인용·비교축을 따라 함께 읽는 연구 아카이브" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --paper:#E8EAE4;
    --surface:#F6F7F2;
    --surface-2:#EFF1EA;
    --ink:#16181A;
    --muted:#5B6068;
    --faint:#8A8F88;
    --line:#D3D7CD;
    --line-strong:#BFC4B8;

    /* 개혁파 정통 — 깊은 페트롤 블루 (정초된, 건축적) */
    --ref:#1E4A5B;
    --ref-ink:#143542;
    --ref-soft:#E2EAEC;

    /* 신정통주의 — 옥스블러드 (위기/변증법, "아니오") */
    --neo:#8C2F22;
    --neo-ink:#65211800;
    --neo-ink:#5F2017;
    --neo-soft:#F0E2DF;

    --font-display:"Noto Serif KR", serif;
    --font-ui:"Pretendard","Noto Sans KR",system-ui,-apple-system,sans-serif;
    --font-mono:"IBM Plex Mono",ui-monospace,monospace;

    --radius:14px;
    --shadow:0 12px 32px rgba(20,30,28,.07);
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    font-family:var(--font-ui);
    color:var(--ink);
    background:var(--paper);
    line-height:1.62;
    -webkit-font-smoothing:antialiased;
  }
  button,input{font:inherit;color:inherit;}
  a{color:var(--ref-ink);}

  .wrap{width:min(1180px,calc(100% - 40px));margin:0 auto;}

  /* ---------- header ---------- */
  .masthead{
    border-bottom:1px solid var(--line-strong);
    background:
      linear-gradient(90deg,var(--ref-soft) 0%,transparent 42%),
      linear-gradient(270deg,var(--neo-soft) 0%,transparent 42%),
      var(--surface);
  }
  .masthead-inner{padding:46px 0 30px;}
  .eyebrow{
    font-family:var(--font-mono);
    font-size:.74rem;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--muted);
    margin:0 0 14px;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  }
  .eyebrow .swatch{width:9px;height:9px;border-radius:2px;display:inline-block;}
  .eyebrow .arrow{color:var(--faint);}
  h1{
    font-family:var(--font-display);
    font-weight:700;
    margin:0;
    font-size:clamp(2.1rem,4.4vw,3.5rem);
    line-height:1.12;
    letter-spacing:-.02em;
  }
  h1 .ko{display:block;}
  h1 .lat{
    display:block;
    font-size:.42em;
    letter-spacing:.04em;
    color:var(--muted);
    font-weight:500;
    margin-top:10px;
  }
  .lead{max-width:680px;margin:18px 0 0;color:var(--muted);font-size:1.04rem;}
  .countbar{
    font-family:var(--font-mono);
    font-size:.8rem;
    color:var(--muted);
    margin-top:22px;
    display:flex;gap:8px;flex-wrap:wrap;align-items:center;
  }
  .countbar b{color:var(--ink);font-weight:600;}
  .countbar .sep{color:var(--line-strong);}

  /* ---------- controls ---------- */
  .controls{
    display:flex;gap:16px;align-items:center;flex-wrap:wrap;
    padding:20px 0;border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:20;
    background:var(--paper);
  }
  .search{flex:1 1 280px;position:relative;}
  .search input{
    width:100%;padding:12px 16px 12px 40px;
    border:1px solid var(--line-strong);border-radius:999px;
    background:var(--surface);outline:none;
  }
  .search input:focus{border-color:var(--ref);box-shadow:0 0 0 4px rgba(30,74,91,.12);}
  .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--faint);}

  .filter{display:flex;gap:6px;}
  .chip{
    border:1px solid var(--line-strong);border-radius:999px;
    background:transparent;padding:8px 14px;cursor:pointer;color:var(--muted);
    font-size:.88rem;transition:background .15s,color .15s,border-color .15s;
  }
  .chip:hover{border-color:var(--ink);}
  .chip[aria-pressed="true"]{background:var(--ink);border-color:var(--ink);color:#fff;}
  .chip.ref[aria-pressed="true"]{background:var(--ref);border-color:var(--ref);}
  .chip.neo[aria-pressed="true"]{background:var(--neo);border-color:var(--neo);}

  /* ---------- tabs ---------- */
  .tabs{display:flex;gap:4px;overflow-x:auto;padding:18px 0 6px;}
  .tab{
    border:none;background:none;cursor:pointer;white-space:nowrap;
    padding:8px 4px;margin-right:18px;color:var(--muted);
    font-weight:500;font-size:.98rem;position:relative;
  }
  .tab .lat{font-family:var(--font-mono);font-size:.7rem;letter-spacing:.08em;display:block;color:var(--faint);text-transform:uppercase;margin-top:1px;}
  .tab.is-active{color:var(--ink);}
  .tab.is-active::after{
    content:"";position:absolute;left:0;right:18px;bottom:-7px;height:2px;background:var(--ink);
  }

  main{padding-bottom:80px;min-height:50vh;}

  /* ---------- generic cards ---------- */
  .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-top:24px;}
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px 22px 22px 26px;position:relative;overflow:hidden;
  }
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--line-strong);}
  .card.t-ref::before{background:var(--ref);}
  .card.t-neo::before{background:var(--neo);}
  .card h3{font-family:var(--font-display);font-weight:600;font-size:1.22rem;margin:0 0 4px;line-height:1.3;}
  .card .by{color:var(--muted);font-size:.92rem;margin:0 0 12px;}
  .card .sum{color:var(--muted);font-size:.95rem;margin:0 0 14px;}
  .meta-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px;}

  .trad-tag{
    font-family:var(--font-mono);font-size:.68rem;letter-spacing:.06em;text-transform:uppercase;
    padding:3px 8px;border-radius:4px;font-weight:600;
  }
  .trad-tag.ref{background:var(--ref-soft);color:var(--ref-ink);}
  .trad-tag.neo{background:var(--neo-soft);color:var(--neo-ink);}
  .cat-tag{font-size:.8rem;color:var(--faint);font-family:var(--font-mono);}

  .tags{display:flex;flex-wrap:wrap;gap:6px;}
  .tag{font-size:.8rem;background:var(--surface-2);border:1px solid var(--line);color:var(--muted);padding:3px 9px;border-radius:999px;}

  .chapters{margin-top:14px;border-top:1px dashed var(--line-strong);padding-top:12px;}
  .chapters summary{cursor:pointer;font-size:.88rem;color:var(--muted);font-family:var(--font-mono);}
  .chapter{padding:10px 0;border-bottom:1px solid var(--line);}
  .chapter:last-child{border-bottom:none;}
  .chapter b{font-weight:600;}
  .chapter p{margin:4px 0 0;font-size:.9rem;color:var(--muted);}

  /* ---------- COMPARISON (signature) ---------- */
  .compare{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    margin-top:24px;overflow:hidden;
  }
  .compare-head{
    padding:22px 26px 18px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(90deg,var(--ref-soft) 0%,transparent 38%,transparent 62%,var(--neo-soft) 100%);
  }
  .loci-label{font-family:var(--font-mono);font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
  .compare-head h3{font-family:var(--font-display);font-weight:600;font-size:1.5rem;margin:6px 0 2px;}
  .compare-head h3 .lat{font-size:.62rem;font-family:var(--font-mono);color:var(--faint);letter-spacing:.06em;margin-left:8px;text-transform:uppercase;}
  .diverge{margin:10px 0 0;font-size:.92rem;color:var(--ink);}
  .diverge b{font-family:var(--font-mono);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-right:8px;}

  .poles{display:grid;grid-template-columns:1fr 1px 1fr;}
  .axis{background:linear-gradient(var(--ref),var(--neo));}
  .pole{padding:22px 26px;}
  .pole-tag{
    font-family:var(--font-mono);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;
    display:inline-flex;align-items:center;gap:7px;margin-bottom:14px;
  }
  .pole-tag::before{content:"";width:8px;height:8px;border-radius:50%;}
  .pole-ref .pole-tag{color:var(--ref-ink);}
  .pole-ref .pole-tag::before{background:var(--ref);}
  .pole-neo .pole-tag{color:var(--neo-ink);}
  .pole-neo .pole-tag::before{background:var(--neo);}
  .position{padding:12px 0;border-bottom:1px solid var(--line);}
  .position:last-child{border-bottom:none;}
  .position .holder{font-weight:600;}
  .position .claim{font-size:.94rem;color:var(--ink);margin:3px 0 6px;}
  .position .loc{font-family:var(--font-mono);font-size:.74rem;color:var(--faint);}
  .pole-empty{color:var(--faint);font-size:.92rem;font-style:normal;padding:12px 0;}
  .pole-empty .invite{display:block;font-family:var(--font-mono);font-size:.74rem;color:var(--neo);margin-top:6px;}

  .concept-switch{display:flex;flex-wrap:wrap;gap:8px;margin-top:24px;}
  .concept-btn{
    border:1px solid var(--line-strong);background:var(--surface);border-radius:999px;
    padding:8px 15px;cursor:pointer;font-size:.9rem;color:var(--muted);
    display:inline-flex;align-items:center;gap:8px;
  }
  .concept-btn:hover{border-color:var(--ink);color:var(--ink);}
  .concept-btn.is-active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .concept-btn .dot{width:6px;height:6px;border-radius:50%;}
  .concept-btn .dot.has-both{background:linear-gradient(90deg,var(--ref) 50%,var(--neo) 50%);}
  .concept-btn .dot.ref-only{background:var(--ref);}

  /* ---------- passages / notes ---------- */
  .card.passage::before{background:linear-gradient(var(--ref),var(--neo));}
  .note{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;}
  .note .ntype{font-family:var(--font-mono);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);}
  .note h3{font-family:var(--font-display);font-size:1.1rem;font-weight:600;margin:6px 0 8px;}
  .note .body{color:var(--muted);font-size:.95rem;}

  .empty{
    grid-column:1/-1;border:1px dashed var(--line-strong);border-radius:var(--radius);
    padding:40px;text-align:center;color:var(--muted);background:var(--surface);
  }
  .empty b{color:var(--ink);}

  footer{border-top:1px solid var(--line);padding:24px 0;color:var(--faint);font-size:.86rem;}

  @media (max-width:760px){
    .grid{grid-template-columns:1fr;}
    .poles{grid-template-columns:1fr;}
    .axis{height:1px;width:auto;background:linear-gradient(90deg,var(--ref),var(--neo));}
    .compare-head{background:var(--surface-2);}
  }
  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto;}
    *{transition:none!important;}
  }
  :focus-visible{outline:2px solid var(--ref);outline-offset:2px;border-radius:4px;}
</style>
</head>

  <main id="view" aria-live="polite"></main>
</div>

<footer><div class="wrap">저작권 있는 원문 전문은 공개하지 않습니다. 서지정보·요약·짧은 인용 위치·비교 메모만 색인합니다.</div></footer>

     keyTopics:["계시론","예정론","자연신학"], majorWorks:["교회교의학","로마서 강해"]}

     diverge:"선택의 근거를 영원한 작정의 절대성에 두느냐, 그리스도라는 한 인격에 두느냐.",
     positions:[

       {tradition:"개혁파 정통", holder:"벌코프", claim:"선택을 하나님의 영원한 작정의 구원론적 국면으로 배치하고 작정의 절대성을 강조한다.", loc:"조직신학 신론"},
       {tradition:"신정통주의", holder:"바르트", claim:"예수 그리스도가 선택하시는 하나님이자 선택받은 인간이다. 추상적 절대작정을 거부하고 선택을 '복음의 총화'로 부른다.", loc:"교회교의학 II/2"}
     ]},
    {id:"revelation", name:"계시론 · 말씀", latin:"De Verbo Dei", category:"신학서론",
     diverge:"성경이 그 자체로 하나님의 말씀인가, 하나님의 말씀이 되는 증언인가.",
     positions:[
       {tradition:"개혁파 정통", holder:"바빙크", claim:"성경을 유기적으로 영감된 하나님의 말씀으로 보고, 기록된 본문을 인식의 원리(principium)로 둔다.", loc:"개혁교의학 계시론"},
       {tradition:"신정통주의", holder:"바르트", claim:"말씀을 계시된 말씀(그리스도)·기록된 말씀(성경)·선포된 말씀(설교)의 삼중 형태로 본다. 성경은 계시를 증언하며 사건으로 하나님의 말씀이 된다.", loc:"교회교의학 I/1–2"}
     ]},
    {id:"natural-theology", name:"자연신학 · 접촉점", latin:"Theologia Naturalis", category:"신학서론 / 신론",
     diverge:"그리스도 밖에서 하나님을 아는 길이 있는가.",
     positions:[
       {tradition:"개혁파 정통", holder:"바빙크", claim:"일반계시를 인정하고, 죄의 영향 아래 제한적이나마 창조 세계를 통한 하나님 인식의 자리를 긍정한다.", loc:"개혁교의학 일반계시"},
       {tradition:"신정통주의", holder:"바르트", claim:"1934년 브룬너에게 '아니오(Nein!)'로 답하며 독립적 자연신학과 접촉점(Anknüpfungspunkt)을 거부한다. analogia entis 대신 analogia fidei를 둔다.", loc:"Nein! (1934)"}
     ]},
    {id:"theology-proper", name:"신론", latin:"De Deo", category:"신론",
     diverge:"", positions:[
       {tradition:"개혁파 정통", holder:"벌코프", claim:"하나님의 존재·속성·삼위일체를 다루고 작정을 신론 안에 배치한다.", loc:"조직신학 신론"}
     ]},
    {id:"ecclesiology", name:"교회론", latin:"De Ecclesia", category:"교회론",
     diverge:"", positions:[
       {tradition:"개혁파 정통", holder:"칼빈", claim:"교회를 어머니로 부르고 말씀과 성례를 참 교회의 표지로 든다.", loc:"강요 IV"}
     ]},
    {id:"christology", name:"기독론", latin:"De Christo", category:"기독론",
     diverge:"", positions:[]},
    {id:"covenant", name:"언약신학", latin:"Foedus", category:"언약신학",
     diverge:"", positions:[]}

  passages:[
    {id:"genesis-1", reference:"창세기 1장", book:"창세기", testament:"구약", summary:"창조와 일반계시 논의의 출발점.", topics:["창조","계시론"]},
    {id:"romans-8-29", reference:"로마서 8:29–30", book:"로마서", testament:"신약", summary:"예지·예정·소명·칭의·영화의 사슬. 예정론의 핵심 본문.", topics:["예정론","구원론"]},
    {id:"romans-9", reference:"로마서 9장", book:"로마서", testament:"신약", summary:"하나님의 주권적 선택과 긍휼. 개혁파와 바르트가 모두 다투는 본문.", topics:["예정론","선택"]},
    {id:"ephesians-1", reference:"에베소서 1:4–5", book:"에베소서", testament:"신약", summary:"창세 전 그리스도 안에서의 선택. 바르트 선택론의 근거 본문.", topics:["예정론","선택"]},
    {id:"matthew-16-18", reference:"마태복음 16:18", book:"마태복음", testament:"신약", summary:"교회의 기초와 반석. 교회론 논의의 본문.", topics:["교회론"]}
  ],

  notes:[
    {id:"note-policy", title:"공개 저장소 운영 원칙", type:"policy", body:"원문 전문 대신 색인·요약·짧은 인용 위치만 공개한다.", tags:["정책"]},
    {id:"note-institutes-axis", title:"기독교 강요를 기준축으로", type:"research-note", body:"강요의 loci를 기준으로 다른 저작과 바르트를 대질시킨다.", tags:["칼빈","방법"]},
    {id:"note-election-compare", title:"예정론 비교 연구 방향", type:"research-note", body:"작정의 절대성(벌코프) 대 그리스도 중심 선택(바르트)을 한 표로 정리한다.", tags:["예정론","바르트","벌코프"]},
    {id:"note-barth-sermon", title:"바르트 말씀론의 설교 적용", type:"sermon-note", body:"삼중 말씀론을 설교 사건 이해에 연결한다.", tags:["바르트","설교"]}
  ]

/* ========================= STATE ========================= */
let state = {view:"compare", trad:"all", q:"", concept:"predestination"};

const el = (sel)=>document.querySelector(sel);
const view = el("#view");

function matchTrad(t){ return state.trad==="all" || t===state.trad; }
function matchQ(haystack){
  if(!state.q) return true;
  return haystack.toLowerCase().includes(state.q.toLowerCase());
}
function tradClass(t){ return TRAD[t] ? TRAD[t].key : ""; }
function tradTag(t){ const k=tradClass(t); return `<span class="trad-tag ${k}">${t}</span>`; }

/* ========================= RENDERERS ========================= */
function renderCompare(){
  const concepts = DATA.topics;
  const switcher = concepts.map(c=>{
    const hasRef = c.positions.some(p=>p.tradition==="개혁파 정통");
    const hasNeo = c.positions.some(p=>p.tradition==="신정통주의");
    const dot = hasRef&&hasNeo ? "has-both" : (hasRef?"ref-only":"ref-only");
    return `<button class="concept-btn ${c.id===state.concept?'is-active':''}" data-concept="${c.id}">
      <span class="dot ${dot}"></span>${c.name}</button>`;
  }).join("");

  const c = concepts.find(x=>x.id===state.concept) || concepts[0];
  const side = (trad)=>{
    let pos = c.positions.filter(p=>p.tradition===trad);
    if(state.trad!=="all") pos = pos.filter(p=>matchTrad(p.tradition));
    if(state.q) pos = pos.filter(p=>matchQ(p.holder+p.claim+c.name));
    if(!pos.length){
      return `<p class="pole-empty">${state.trad!=="all"||state.q ? "조건에 맞는 입장이 없습니다." :
        `아직 입력된 입장이 없습니다.<span class="invite">positions[]에 한 줄 추가하면 이 자리에 채워집니다.</span>`}</p>`;
    }
    return pos.map(p=>`<div class="position">
      <span class="holder">${p.holder}</span>
      <p class="claim">${p.claim}</p>
      <span class="loc">${p.loc}</span></div>`).join("");
  };

  view.innerHTML = `
    <div class="concept-switch">${switcher}</div>
    <article class="compare">
      <div class="compare-head">
        <span class="loci-label">LOCUS · 교리</span>
        <h3>${c.name}<span class="lat">${c.latin||""}</span></h3>
        ${c.diverge?`<p class="diverge"><b>갈라지는 지점</b>${c.diverge}</p>`:""}
      </div>
      <div class="poles">
        <div class="pole pole-ref"><span class="pole-tag">개혁파 정통</span>${side("개혁파 정통")}</div>
        <div class="axis" aria-hidden="true"></div>
        <div class="pole pole-neo"><span class="pole-tag">신정통주의</span>${side("신정통주의")}</div>
      </div>
    </article>`;

  view.querySelectorAll(".concept-btn").forEach(b=>b.onclick=()=>{state.concept=b.dataset.concept;render();});
}

function renderBooks(){
  const items = DATA.books.filter(b=>matchTrad(b.tradition) &&
    matchQ(b.title+b.author+b.summary+b.topics.join(" ")));
  if(!items.length) return emptyState("책");
  view.innerHTML = `<div class="grid">`+items.map(b=>`
    <article class="card t-${tradClass(b.tradition)}">
      <div class="meta-row">${tradTag(b.tradition)}<span class="cat-tag">${b.category}</span></div>
      <h3>${b.title}</h3>
      <p class="by">${b.author} · ${b.originalAuthor}</p>
      <p class="sum">${b.summary}</p>
      <div class="tags">${b.topics.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
      ${b.chapters&&b.chapters.length?`<details class="chapters"><summary>장별 요약 ${b.chapters.length}개</summary>
        ${b.chapters.map(ch=>`<div class="chapter"><b>${ch.title}</b><p>${ch.summary}</p></div>`).join("")}
      </details>`:""}
    </article>`).join("")+`</div>`;
}

function renderAuthors(){
  const items = DATA.authors.filter(a=>matchTrad(a.tradition) &&
    matchQ(a.koreanName+a.name+a.summary+a.keyTopics.join(" ")));
  if(!items.length) return emptyState("학자");
  view.innerHTML = `<div class="grid">`+items.map(a=>`
    <article class="card t-${tradClass(a.tradition)}">
      <div class="meta-row">${tradTag(a.tradition)}<span class="cat-tag">${a.period}</span></div>
      <h3>${a.koreanName}</h3>
      <p class="by">${a.name}</p>
      <p class="sum">${a.summary}</p>
      <div class="tags">${a.keyTopics.map(t=>`<span class="tag">${t}</span>`).join("")}
        ${a.majorWorks.map(w=>`<span class="tag">📖 ${w}</span>`).join("")}</div>
    </article>`).join("")+`</div>`;
}

function renderPassages(){
  const items = DATA.passages.filter(p=>matchQ(p.reference+p.summary+p.topics.join(" ")));
  if(!items.length) return emptyState("본문");
  view.innerHTML = `<div class="grid">`+items.map(p=>`
    <article class="card passage">
      <div class="meta-row"><span class="cat-tag">${p.testament} · ${p.book}</span></div>
      <h3>${p.reference}</h3>
      <p class="sum">${p.summary}</p>
      <div class="tags">${p.topics.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
    </article>`).join("")+`</div>`;
}

function renderNotes(){
  const items = DATA.notes.filter(n=>matchQ(n.title+n.body+n.tags.join(" ")));
  if(!items.length) return emptyState("메모");
  view.innerHTML = `<div class="grid">`+items.map(n=>`
    <article class="note">
      <span class="ntype">${n.type}</span>
      <h3>${n.title}</h3>
      <p class="body">${n.body}</p>
      <div class="tags" style="margin-top:12px">${n.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
    </article>`).join("")+`</div>`;
}

function emptyState(label){
  view.innerHTML = `<div class="grid"><div class="empty">
    <b>${label}</b>에서 조건에 맞는 항목을 찾지 못했습니다.<br>검색어를 지우거나 전통 필터를 '전체'로 바꿔 보세요.</div></div>`;
}

function render(){
  ({compare:renderCompare,books:renderBooks,authors:renderAuthors,
    passages:renderPassages,notes:renderNotes}[state.view])();
}

/* ========================= WIRING ========================= */
function renderCounts(){
  el("#countbar").innerHTML =
    `<b>${DATA.books.length}</b> 책 <span class="sep">·</span>` +
    `<b>${DATA.authors.length}</b> 학자 <span class="sep">·</span>` +
    `<b>${DATA.topics.length}</b> 개념 <span class="sep">·</span>` +
    `<b>${DATA.topics.reduce((n,t)=>n+t.positions.length,0)}</b> 입장 <span class="sep">·</span>` +
    `<b>${DATA.passages.length}</b> 본문`;
}

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("is-active"));
  t.classList.add("is-active");
  state.view=t.dataset.view; render();
});
document.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{
  document.querySelectorAll(".chip").forEach(x=>x.setAttribute("aria-pressed","false"));
  c.setAttribute("aria-pressed","true");
  state.trad=c.dataset.trad; render();
});
el("#q").addEventListener("input",e=>{state.q=e.target.value.trim();render();});

renderCounts();
render();
</script>
</body>
